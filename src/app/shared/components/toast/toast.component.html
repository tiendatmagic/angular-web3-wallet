<!-- TOAST SYSTEM (RICH AESTHETICS - SLIDE IN WITH DYNAMIC PROGRESS BAR) -->
<div class="fixed bottom-5 right-5 z-[9999] flex flex-col gap-3 pointer-events-none max-w-sm w-full px-4 sm:px-0">
  
  <!-- Success Toast (Thành công) -->
  @if (successMessage()) {
    <div class="toast-animate pointer-events-auto relative flex items-start gap-3 bg-white/95 dark:bg-slate-900/95 text-slate-800 dark:text-slate-200 px-4 py-3.5 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-800/80 backdrop-blur-md overflow-hidden w-full group transition-all duration-300">
      
      <!-- Icon Check tròn xanh dùng app-icon -->
      <div class="flex-shrink-0 w-6 h-6 rounded-full bg-emerald-500 text-white flex items-center justify-center shadow-md shadow-emerald-500/20">
        <app-icon name="check" class="w-3.5 h-3.5" strokeWidth="3" />
      </div>

      <!-- Nội dung -->
      <div class="flex-1 pr-6 pt-0.5">
        <p class="text-xs sm:text-sm font-bold leading-snug tracking-tight text-slate-700 dark:text-slate-200">
          {{ successMessage()!.msg }}
        </p>
      </div>

      <!-- Nút đóng dùng app-icon -->
      <button 
        (click)="toastService.successMessage.set(null)"
        class="absolute top-3.5 right-3.5 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors p-0.5 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800/50 cursor-pointer">
        <app-icon name="close" class="w-3.5 h-3.5" strokeWidth="2.5" />
      </button>

      <!-- Thanh tiến trình tự chạy lùi -->
      <div class="absolute bottom-0 left-0 right-0 h-1 bg-emerald-100 dark:bg-emerald-950/40">
        <div class="toast-progress-success h-full bg-emerald-500 rounded-r-full"></div>
      </div>
    </div>
  }

  <!-- Error Toast (Lỗi) -->
  @if (errorMessage()) {
    <div class="toast-animate pointer-events-auto relative flex items-start gap-3 bg-white/95 dark:bg-slate-900/95 text-slate-800 dark:text-slate-200 px-4 py-3.5 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-800/80 backdrop-blur-md overflow-hidden w-full group transition-all duration-300">
      
      <!-- Icon Close tròn đỏ dùng app-icon -->
      <div class="flex-shrink-0 w-6 h-6 rounded-full bg-rose-500 text-white flex items-center justify-center shadow-md shadow-rose-500/20">
        <app-icon name="close" class="w-3.5 h-3.5" strokeWidth="3" />
      </div>

      <!-- Nội dung -->
      <div class="flex-1 pr-6 pt-0.5">
        <p class="text-xs sm:text-sm font-bold leading-snug tracking-tight text-slate-700 dark:text-slate-200">
          {{ errorMessage()!.msg }}
        </p>
      </div>

      <!-- Nút đóng dùng app-icon -->
      <button 
        (click)="toastService.errorMessage.set(null)"
        class="absolute top-3.5 right-3.5 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors p-0.5 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800/50 cursor-pointer">
        <app-icon name="close" class="w-3.5 h-3.5" strokeWidth="2.5" />
      </button>

      <!-- Thanh tiến trình tự chạy lùi -->
      <div class="absolute bottom-0 left-0 right-0 h-1 bg-rose-100 dark:bg-rose-950/40">
        <div class="toast-progress-error h-full bg-rose-500 rounded-r-full"></div>
      </div>
    </div>
  }

</div>
