@if (type === 'full') {
  <div
    class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-950/60 rounded-xl border border-slate-200/50 dark:border-slate-800/80 w-full"
    [class.opacity-50]="disabled"
  >
    <div class="space-y-0.5 pr-4">
      @if (label) {
        <span class="text-xs font-bold text-slate-800 dark:text-white block">{{ label }}</span>
      }
      @if (description) {
        <span class="text-xs text-slate-400 font-semibold block leading-tight">
          {{ description }}
        </span>
      }
    </div>
    <label class="relative inline-flex items-center cursor-pointer shrink-0" [class.pointer-events-none]="disabled">
      <input
        type="checkbox"
        [checked]="checked"
        (change)="onToggle($event)"
        [disabled]="disabled"
        class="sr-only peer"
      />
      <div
        class="w-11 h-6 bg-slate-200 dark:bg-slate-800 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-slate-600 peer-checked:bg-[var(--color-primary)] transition-colors duration-200"
      ></div>
    </label>
  </div>
} @else {
  <label
    class="relative inline-flex items-center cursor-pointer shrink-0"
    [class.opacity-50]="disabled"
    [class.pointer-events-none]="disabled"
  >
    <input
      type="checkbox"
      [checked]="checked"
      (change)="onToggle($event)"
      [disabled]="disabled"
      class="sr-only peer"
    />
    <div
      class="w-11 h-6 bg-slate-200 dark:bg-slate-800 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-slate-600 peer-checked:bg-[var(--color-primary)] transition-colors duration-200 shrink-0"
    ></div>
    @if (label) {
      <span class="ml-3 text-sm font-semibold text-slate-700 dark:text-slate-300 select-none">
        {{ label }}
      </span>
    }
  </label>
}
