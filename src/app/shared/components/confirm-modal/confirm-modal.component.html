@if (!isDynamic) {
  @if (isOpen) {
    <div class="fixed inset-0 z-[60] flex items-center justify-center p-4">
            <div (click)="onCancel()" class="fixed inset-0 bg-black/40"></div>

      <div class="relative bg-white dark:bg-slate-900 rounded-[15px] border border-slate-200 dark:border-slate-800 p-6 max-w-sm w-full shadow-2xl text-slate-800 dark:text-slate-200 text-center">
        <ng-container *ngTemplateOutlet="confirmContent"></ng-container>
      </div>
    </div>
  }
} @else {
    <div class="text-center w-full">
    <ng-container *ngTemplateOutlet="confirmContent"></ng-container>
  </div>
}

<ng-template #confirmContent>
  <div class="w-12 h-12 rounded-full bg-rose-500/10 text-rose-500 flex items-center justify-center mx-auto mb-4">
    <app-icon name="warning" class="h-6 w-6" strokeWidth="2" />
  </div>

  <h4 class="text-base font-extrabold text-slate-900 dark:text-white mb-2">
    {{ title }}
  </h4>

  @if (descriptionHtml) {
    <div class="text-sm text-slate-500 dark:text-slate-400 mb-5 leading-relaxed font-semibold" [innerHTML]="descriptionHtml"></div>
  } @else {
    <p class="text-sm text-slate-500 dark:text-slate-400 mb-5 leading-relaxed font-semibold">
      {{ description }}
    </p>
  }

    @if (!isDynamic) {
    <div class="mb-5 text-left">
      <ng-content></ng-content>
    </div>
  }

  <div class="flex gap-3">
    <button
      app-button
      variant="cancel"
      type="button"
      (click)="onCancel()"
      [disabled]="isSubmitting"
      class="flex-1"
    >
      {{ cancelText }}
    </button>
    <button
      app-button
      [variant]="confirmVariant"
      type="button"
      (click)="onConfirm()"
      [loading]="isSubmitting"
      class="flex-1 shadow-md"
    >
      <span>{{ confirmText }}</span>
    </button>
  </div>
</ng-template>
