<div class="border border-slate-200/50 dark:border-slate-800/50 rounded-xl overflow-hidden bg-slate-50/40 dark:bg-slate-950/30 hover:bg-slate-50/60 dark:hover:bg-slate-950/50 transition-all duration-300"
     [class.shadow-sm]="expanded"
     [class.!bg-slate-100/40]="expanded"
     [class.dark:!bg-slate-950/60]="expanded"
     [class.border-[var(--color-primary)]/30]="expanded">
    <button type="button"
          (click)="toggle()"
          [disabled]="disabled"
          class="w-full flex items-center justify-between px-5 py-4 text-left font-bold text-sm sm:text-base text-slate-800 dark:text-slate-100 hover:bg-slate-50/50 dark:hover:bg-slate-950/30 transition-all duration-200 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed select-none focus:outline-none">
    <div class="flex flex-col gap-0.5">
      <span>{{ title }}</span>
      @if (subtitle) {
        <span class="text-xs font-semibold text-slate-400 dark:text-slate-500">{{ subtitle }}</span>
      }
    </div>
    <div class="text-slate-400 dark:text-slate-500 transition-transform duration-300"
         [class.rotate-180]="expanded">
      <app-icon name="chevron-down" strokeWidth="2.5" class="w-4 h-4" />
    </div>
  </button>

    <div class="grid transition-all duration-300 ease-in-out"
       [style.grid-template-rows]="expanded ? '1fr' : '0fr'">
    <div class="overflow-hidden">
      <div class="px-5 pb-5 pt-1.5 text-sm text-slate-600 dark:text-slate-350 leading-relaxed border-t border-slate-100 dark:border-slate-800/40">
        <ng-content></ng-content>
      </div>
    </div>
  </div>
</div>
