@if (totalPages > 1) {
  <div class="px-5 py-4 border-t border-slate-100 dark:border-slate-800 flex items-center justify-between gap-4 flex-wrap">
    <span class="text-xs font-semibold text-slate-400">
      Hiển thị {{ getStartIndex() }}-{{ getEndIndex() }} trên tổng số {{ totalItems }} {{ itemName }}
    </span>
    <div class="flex items-center gap-1.5">
      <!-- Nút Previous -->
      <button
        (click)="goToPage(currentPage - 1)"
        [disabled]="currentPage === 1"
        class="w-8.5 h-8.5 rounded-xl border border-slate-200 dark:border-slate-800 flex items-center justify-center text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-transparent transition-all active:scale-[0.98]"
      >
        <app-icon name="chevron-left" class="h-4 w-4" strokeWidth="2.5" />
      </button>

      <!-- Các số trang -->
      @for (p of pagesArray; track $index) {
        @if (p === '...') {
          <span class="w-8.5 h-8.5 flex items-center justify-center text-slate-400 text-xs font-bold">...</span>
        } @else {
          <button
            (click)="goToPage(toNumber(p))"
            [class]="currentPage === p
              ? 'bg-[var(--dynamic-primary)] text-white border-transparent shadow-md shadow-[var(--dynamic-primary)]/20 font-extrabold'
              : 'bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 font-semibold'"
            class="w-8.5 h-8.5 rounded-xl border text-xs transition-all active:scale-[0.98] flex items-center justify-center"
          >
            {{ p }}
          </button>
        }
      }

      <!-- Nút Next -->
      <button
        (click)="goToPage(currentPage + 1)"
        [disabled]="currentPage === totalPages"
        class="w-8.5 h-8.5 rounded-xl border border-slate-200 dark:border-slate-800 flex items-center justify-center text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-transparent transition-all active:scale-[0.98]"
      >
        <app-icon name="chevron-right" class="h-4 w-4" strokeWidth="2.5" />
      </button>
    </div>
  </div>
}
