<svg
  xmlns="http://www.w3.org/2000/svg"
  width="100%"
  height="100%"
  [attr.viewBox]="viewBox"
  [attr.fill]="solid ? 'currentColor' : 'none'"
  [attr.stroke]="solid ? 'none' : 'currentColor'"
  [attr.stroke-width]="solid ? null : strokeWidth"
  stroke-linecap="round"
  stroke-linejoin="round"
>
  @switch (name) {
    <!-- ==================== THEME ICONS ==================== -->
    @case ('sun') {
      <!-- Sun - Light mode -->
      <path
        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
      />
    }

    @case ('moon') {
      <!-- Moon - Dark mode -->
      <path
        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
      />
    }

    @case ('auto') {
      <!-- Monitor - Auto mode -->
      <path
        d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
      />
    }

    <!-- ==================== UI / ACTION ICONS ==================== -->
    @case ('close') {
      <!-- X mark - Đóng -->
      <path d="M6 18L18 6M6 6l12 12" />
    }

    @case ('check') {
      <!-- Simple checkmark - Đã hoàn thành -->
      <path d="M5 13l4 4L19 7" />
    }

    @case ('check-circle') {
      <!-- Check circle -->
      <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
    }

    @case ('copy') {
      <!-- Copy - Sao chép địa chỉ ví -->
      <path
        d="M16.5 8.25V6a2.25 2.25 0 00-2.25-2.25H6A2.25 2.25 0 003.75 6v8.25A2.25 2.25 0 006 16.5h2.25m3.375-3.375V18a2.25 2.25 0 002.25 2.25H18A2.25 2.25 0 0020.25 18v-8.25A2.25 2.25 0 0018 7.5h-3.375a2.25 2.25 0 00-2.25 2.25z"
      />
    }

    @case ('link-chain') {
      <!-- Link - Chuyển mạng -->
      <path
        d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"
      />
    }

    @case ('globe') {
      <!-- Globe - Quả địa cầu ngôn ngữ -->
      <path
        d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"
      />
    }

    @case ('external-link') {
      <!-- External link arrow - Xem trên Explorer -->
      <path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
    }

    @case ('logout') {
      <!-- Logout arrow - Ngắt kết nối ví -->
      <path
        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
      />
    }

    @case ('hamburger') {
      <!-- Menu bar -->
      <path d="M4 6h16M4 12h16M4 18h16" />
    }

    @case ('send') {
      <!-- Paper plane - Gửi token -->
      <path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
    }

    @case ('pen') {
      <!-- Pen - Ký tin nhắn -->
      <path
        d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
      />
    }

    @case ('warning') {
      <!-- Triangle warning -->
      <path
        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
      />
    }

    @case ('loading') {
      <!-- Spinner loading -->
      <path d="M12 2a10 10 0 1 0 10 10" />
    }

    @case ('wallet') {
      <!-- Wallet connection -->
      <path
        d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 5h10a2 2 0 012 2v10a2 2 0 01-2 2H7a2 2 0 01-2-2V7a2 2 0 012-2z"
      />
    }

    @case ('chevron-down') {
      <path d="M19 9l-7 7-7-7" />
    }

    @case ('arrow-up-right') {
      <path d="M7 17L17 7M17 7H7M17 7V17" />
    }

    @case ('search') {
      <!-- Magnifying glass - Tìm kiếm -->
      <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
    }

    <!-- ==================== DEFAULT ==================== -->
    @default {
      <path
        d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
      />
    }
  }
</svg>
