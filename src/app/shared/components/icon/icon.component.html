<!-- app-icon: SVG Icon Library - Cafe Blockchain -->
<!-- host: display inline-flex → width/height 100% → kế thừa kích thước từ class bên ngoài -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="100%"
  height="100%"
  [attr.viewBox]="viewBox"
  [attr.fill]="solid ? 'currentColor' : 'none'"
  [attr.stroke]="solid ? 'none' : 'currentColor'"
  [attr.stroke-width]="solid ? null : strokeWidth"
  stroke-linecap="round"
  stroke-linejoin="round"
>
  @switch (name) {

    <!-- ==================== NAVIGATION ICONS ==================== -->

    @case ('dashboard') {
      <!-- 4 ô vuông - Tổng quan -->

    }

    @case ('tables') {

      <path d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" />

    @case ('pos') {

    @case ('menu') {

    @case ('inventory') {

    }

    @case ('close') {
      <!-- X mark - Đóng -->
      <path d="M6 18L18 6M6 6l12 12" />

    @case ('hamburger') {
      <!-- Hamburger menu - Menu mobile -->
      <path d="M4 6h16M4 12h16M4 18h16" />

    @case ('dots-vertical') {

    @case ('search') {

    @case ('sync') {

    @case ('check') {

      <path d="M5 13l4 4L19 7" />

    @case ('clock') {
