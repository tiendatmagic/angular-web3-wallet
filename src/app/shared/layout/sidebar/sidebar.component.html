<!-- DESKTOP SIDEBAR - Cố định bên trái (>= md) -->
<aside
  class="fixed inset-y-0 left-0 z-50 w-72 bg-white dark:bg-slate-950 border-r border-slate-200/50 dark:border-slate-900/50 hidden md:flex flex-col shadow-sm select-none"
>
  <!-- LOGO & BRAND -->
  <div
    class="flex items-center gap-3.5 px-6 py-6 border-b border-slate-100 dark:border-slate-800/60"
  >
    <!-- Logo icon -->
    <app-logo class="w-11 h-11 shrink-0" />
    <!-- Tiêu đề thương hiệu -->
    <div class="flex flex-col select-none">
      <span
        class="text-base font-black tracking-tight leading-none text-slate-800 dark:text-white mb-1.5"
      >
        <span class="text-pink-600 dark:text-pink-500">Angular</span>
        <span class="text-purple-600 dark:text-purple-400">Web3</span>
      </span>
      <span
        class="text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest leading-none"
      >
        Web3 Template
      </span>
    </div>
  </div>

  <!-- MENU LINKS -->
  <nav class="flex-1 px-4 py-6 space-y-1.5 overflow-y-auto">
    <!-- Trang chủ -->
    <a
      routerLink="/home"
      routerLinkActive="bg-purple-50 dark:bg-purple-950/30 text-purple-600 dark:text-purple-400 font-extrabold"
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex items-center gap-3.5 px-4 py-3 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800/40 hover:text-purple-600 dark:hover:text-purple-400 text-slate-600 dark:text-slate-400 font-semibold text-sm transition-all cursor-pointer"
    >
      <app-icon name="home" class="w-5 h-5 flex-shrink-0" />
      <span>Trang chủ</span>
    </a>

    <!-- Giới thiệu -->
    <a
      routerLink="/about"
      routerLinkActive="bg-purple-50 dark:bg-purple-950/30 text-purple-600 dark:text-purple-400 font-extrabold"
      class="flex items-center gap-3.5 px-4 py-3 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800/40 hover:text-purple-600 dark:hover:text-purple-400 text-slate-600 dark:text-slate-400 font-semibold text-sm transition-all cursor-pointer"
    >
      <app-icon name="info" class="w-5 h-5 flex-shrink-0" />
      <span>Giới thiệu</span>
    </a>

    <!-- Liên hệ -->
    <a
      routerLink="/contact"
      routerLinkActive="bg-purple-50 dark:bg-purple-950/30 text-purple-600 dark:text-purple-400 font-extrabold"
      class="flex items-center gap-3.5 px-4 py-3 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800/40 hover:text-purple-600 dark:hover:text-purple-400 text-slate-600 dark:text-slate-400 font-semibold text-sm transition-all cursor-pointer"
    >
      <app-icon name="send" class="w-5 h-5 flex-shrink-0" />
      <span>Liên hệ</span>
    </a>
  </nav>

  <!-- BOTTOM CONTROLS -->
  <div
    class="px-5 py-4 border-t border-slate-100 dark:border-slate-800/60 bg-slate-50/30 dark:bg-slate-900/10 space-y-4"
  >
    <app-tx-speed-selector />
    <app-theme-switcher />

    <!-- Trạng thái ví kết nối -->
    @if (web3Service.isConnected()) {
      <div
        class="pt-3 border-t border-slate-100 dark:border-slate-800/60 flex items-center gap-2"
      >
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 flex-shrink-0 animate-pulse"></span>
        <span class="text-xs font-bold text-slate-500 dark:text-slate-400 truncate font-mono">
          {{ web3Service.address() | slice: 0 : 6 }}...{{ web3Service.address() | slice: -4 }}
        </span>
      </div>
    }

    <!-- Copyright -->
    <div
      class="text-[9px] text-slate-400 dark:text-slate-500 text-center pt-2 border-t border-slate-100 dark:border-slate-800/40"
    >
      © 2026 Angular Web3. Phiên bản phi tập trung.
    </div>
  </div>
</aside>
