<aside
  class="fixed inset-y-0 left-0 z-50 w-72 bg-white dark:bg-slate-950 border-r border-slate-200/50 dark:border-slate-900/50 hidden md:flex flex-col shadow-sm select-none"
>
  <a
    routerLink="/"
    class="flex items-center gap-3.5 px-6 py-6 border-b border-slate-100 dark:border-slate-800/60 cursor-pointer"
  >
    <app-logo class="w-11 h-11 shrink-0" />
    <div class="flex flex-col select-none">
      <span
        class="text-base font-black tracking-tight leading-none text-slate-800 dark:text-white mb-1.5"
      >
        <span class="text-primary">Angular</span>
        <span class="text-secondary">Web3</span>
      </span>
      <span
        class="text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest leading-none"
      >
        Web3 Template
      </span>
    </div>
  </a>

  <nav class="flex-1 px-4 py-6 space-y-1.5 overflow-y-auto">
    <a
      routerLink="/home"
      routerLinkActive="!bg-primary/10 !text-primary !font-extrabold"
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex items-center gap-3.5 px-4 py-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800/50 text-slate-600 dark:text-slate-400 font-semibold text-sm transition-colors duration-200 cursor-pointer"
    >
      <app-icon name="home" class="w-5 h-5 flex-shrink-0" />
      <span>Trang chủ</span>
    </a>

    <a
      routerLink="/about"
      routerLinkActive="!bg-primary/10 !text-primary !font-extrabold"
      class="flex items-center gap-3.5 px-4 py-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800/50 text-slate-600 dark:text-slate-400 font-semibold text-sm transition-colors duration-200 cursor-pointer"
    >
      <app-icon name="info" class="w-5 h-5 flex-shrink-0" />
      <span>Giới thiệu</span>
    </a>

    <a
      routerLink="/contact"
      routerLinkActive="!bg-primary/10 !text-primary !font-extrabold"
      class="flex items-center gap-3.5 px-4 py-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800/50 text-slate-600 dark:text-slate-400 font-semibold text-sm transition-colors duration-200 cursor-pointer"
    >
      <app-icon name="send" class="w-5 h-5 flex-shrink-0" />
      <span>Liên hệ</span>
    </a>
  </nav>

  <div
    class="px-5 py-4 border-t border-slate-100 dark:border-slate-800/60 bg-slate-50/30 dark:bg-slate-900/10 space-y-4"
  >
    @if (stateService.isWeb3Enabled) {
      <app-tx-speed-selector />
    }
    <app-theme-switcher />

  </div>
</aside>
