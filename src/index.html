<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AngularWeb3Wallet</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  
    <script>
    (function () {
      const savedTheme = localStorage.getItem('theme_mode');
      const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (savedTheme === 'dark' || (!savedTheme && systemDark) || (savedTheme === 'auto' && systemDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

    <style>
    :root {
      --splash-bg: #f8fafc;
      --splash-text: #0f172a;
      --splash-brand: #8000ff;
      --splash-primary: #ff00dd;
    }
    html.dark {
      --splash-bg: #030712;
      --splash-text: #f8fafc;
    }
    .app-splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--splash-bg);
      color: var(--splash-text);
      z-index: 99999;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: background-color 0.3s;
    }
    .app-splash-logo-container {
      position: relative;
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background-color: rgba(128, 0, 255, 0.08);
      border: 1px solid rgba(128, 0, 255, 0.15);
      padding: 10px;
    }
    html.dark .app-splash-logo-container {
      background-color: rgba(128, 0, 255, 0.12);
      border-color: rgba(128, 0, 255, 0.2);
    }
    .app-splash-logo-glow {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(to top right, rgba(255, 0, 221, 0.1), rgba(128, 0, 255, 0.1));
      filter: blur(8px);
    }
    .app-splash-logo {
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 10;
      animation: splash-spin 20s linear infinite;
    }
    .app-splash-spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(128, 0, 255, 0.1);
      border-radius: 50%;
      border-top-color: var(--splash-brand);
      animation: splash-spin-spinner 0.8s infinite linear;
    }
    @keyframes splash-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes splash-spin-spinner {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <app-root>
        <div class="app-splash-screen">
      <div class="app-splash-logo-container">
        <div class="app-splash-logo-glow"></div>
        <img src="assets/logo.svg" class="app-splash-logo" alt="Logo">
      </div>
      <div class="app-splash-spinner"></div>
    </div>
  </app-root>
</body>
</html>
